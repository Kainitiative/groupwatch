name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo $GITHUB_REPOSITORY | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (app)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (app)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=slim-v1
          cache-to: type=gha,scope=slim-v1,mode=max

      - name: Build and push (migrator)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: migrator
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:migrator
          cache-from: type=gha,scope=slim-v1-migrator
          cache-to: type=gha,scope=slim-v1-migrator,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,deploy/"
          target: "/opt/groupwatch"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/groupwatch

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            GITHUB_REPOSITORY=${{ github.repository }} docker compose pull app
            GITHUB_REPOSITORY=${{ github.repository }} docker compose --profile migration pull migrator

            # Run DB schema push (uses dedicated migrator image with drizzle-kit)
            GITHUB_REPOSITORY=${{ github.repository }} docker compose --profile migration run --rm migrator

            # Bring up / restart the app
            GITHUB_REPOSITORY=${{ github.repository }} docker compose up -d --remove-orphans

            # Wait and verify health
            sleep 15
            curl -sf http://localhost:8080/api/healthz || (echo "Health check failed!" && exit 1)

            # Clean up old images
            docker image prune -f

            echo "Deployed successfully — $(date)"
