name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run codegen
        run: pnpm --filter @workspace/api-spec run codegen

      - name: Build frontend
        run: pnpm --filter @workspace/app run build

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/incidentiq

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "Running DB migrations..."
            pnpm --filter @workspace/db run push

            echo "Building and deploying containers..."
            docker compose -f deployment/docker-compose.yml pull --quiet
            docker compose -f deployment/docker-compose.yml up -d --build --remove-orphans

            echo "Waiting for API to be healthy..."
            sleep 10
            curl -f http://localhost:8080/api/healthz || (echo "Health check failed!" && exit 1)

            echo "Deployment complete! $(date)"
